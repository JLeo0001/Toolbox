name: Build Android APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant permission to gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Decode Keystore
        id: decode_keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            echo "keystore_decoded=true" >> "$GITHUB_OUTPUT"
            echo "Keystore decoded successfully"
          else
            echo "keystore_decoded=false" >> "$GITHUB_OUTPUT"
            echo "No keystore secret found — skipping signed release build"
          fi

      - name: Build Release APK
        if: steps.decode_keystore.outputs.keystore_decoded == 'true'
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build Release APK (unsigned fallback)
        if: steps.decode_keystore.outputs.keystore_decoded != 'true'
        run: |
          echo "::warning::No keystore secrets — building unsigned release APK"
          # Temporarily disable signing config for unsigned build
          ./gradlew assembleRelease -PKEYSTORE_PATH=

      - name: List APK outputs
        run: |
          echo "=== APK Outputs ==="
          find app/build/outputs/apk -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          echo "=== AAB Outputs ==="
          find app/build/outputs/bundle -name "*.aab" -type f 2>/dev/null || echo "No AAB found"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: release-apk

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: debug-apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: ""
          body: |
            ## 小工具箱 ${{ github.ref_name }}

            ### 变更
            请查看 [CHANGELOG](./CHANGELOG.md) 或 commit 历史了解详情。

            ### 下载
            - **APK (Release):** 见附件
          files: |
            release-apk/*.apk
            debug-apk/*.apk
          generate_release_notes: true
